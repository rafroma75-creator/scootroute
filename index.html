<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScootRoute</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

</head>


<body>

<div class="header">
    🛵 ScootRoute
</div>


<div class="panel">

<input id="start" placeholder="📍 Partenza">

<input id="end" placeholder="🏁 Destinazione">


<select id="vehicle">

<option value="50cc">
🛵 Ciclomotore 50cc
</option>

<option value="125cc">
🛵 Scooter 125cc
</option>

<option value="motorcycle">
🏍 Moto
</option>

</select>


<button onclick="calculateRoute()">
CALCOLA PERCORSO
</button>


<div id="info">
Pronto
</div>


</div>



<div id="map"></div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="roads.js"></script>
<script src="roadCheck.js"></script>
<script src="app.js"></script>
</body>

</html>
